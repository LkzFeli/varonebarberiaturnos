<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RobloxD — CCU Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --rbx-red: #E8384D;
            --bg: #050505;
            --card: #0f0f0f;
            --border: rgba(255,255,255,0.07);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #f4f4f5;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* UI Dinámica */
        .glass-header {
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .game-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--rbx-red);
            box-shadow: 0 25px 50px -12px rgba(232, 56, 77, 0.2);
        }

        /* Vistas */
        .view { display: none; opacity: 0; transform: translateY(15px); transition: all 0.5s ease; }
        .view.active { display: block; opacity: 1; transform: translateY(0); }

        /* Skeletons Animados */
        .shimmer {
            background: linear-gradient(90deg, #111 25%, #1d1d1d 50%, #111 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite linear;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Consola de Logs */
        #terminal {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 35px;
            background: #000; color: #0f0;
            font-family: 'Courier New', monospace; font-size: 11px;
            padding: 8px 20px; border-top: 1px solid var(--border);
            z-index: 2000; transition: height 0.3s ease; cursor: pointer;
        }
        #terminal.open { height: 180px; overflow-y: auto; }

        /* Estrellas */
        .stars span { cursor: pointer; transition: 0.2s; font-size: 1.8rem; color: #222; }
        .stars .active { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }

        .btn-primary {
            background: var(--rbx-red);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            filter: brightness(1.2);
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(232, 56, 77, 0.3);
        }
    </style>
</head>
<body class="pb-20">

    <header class="glass-header fixed top-0 w-full">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <h1 class="text-2xl font-800 tracking-tighter cursor-pointer" onclick="Router.go('home')">
                ROBLOX<span class="text-[#E8384D]">D</span>
            </h1>

            <div class="flex-1 max-w-xl mx-10 relative">
                <input type="text" id="searchInput" onkeypress="if(event.key==='Enter') App.search(this.value)"
                    placeholder="Buscar en la base de datos de CCUCheck..." 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-2.5 px-6 text-sm focus:outline-none focus:border-[#E8384D] transition">
            </div>

            <nav class="flex items-center gap-6">
                <button onclick="Router.go('profile')" class="text-sm font-bold hover:text-[#E8384D] transition">Mi Perfil</button>
                <div class="w-10 h-10 rounded-2xl bg-zinc-900 border border-white/10 flex items-center justify-center font-bold text-xs">SF</div>
            </nav>
        </div>
    </header>

    <main class="pt-32 px-6 max-w-7xl mx-auto">
        
        <section id="view-home" class="view active">
            <div class="flex justify-between items-end mb-10">
                <div>
                    <h2 class="text-4xl font-800 tracking-tighter">Explorar Experiencias</h2>
                    <p class="text-zinc-500 text-sm mt-1 font-medium">Análisis de CCU y métricas de rendimiento.</p>
                </div>
                <div id="status-indicator" class="flex items-center gap-2 bg-zinc-900 px-3 py-1.5 rounded-full border border-white/5">
                    <div class="w-2 h-2 rounded-full bg-yellow-500" id="dot"></div>
                    <span class="text-[10px] font-black uppercase tracking-widest text-zinc-400" id="status-text">Iniciando...</span>
                </div>
            </div>

            <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8">
                </div>
        </section>

        <section id="view-detail" class="view">
            <div id="detail-container"></div>
        </section>

        <section id="view-profile" class="view">
            <div class="grid lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1 space-y-6">
                    <div class="game-card p-10 text-center">
                        <div class="w-24 h-24 bg-[#E8384D]/10 text-[#E8384D] rounded-[2rem] mx-auto mb-6 flex items-center justify-center text-3xl font-black">SF</div>
                        <h3 class="text-2xl font-800">sannfe</h3>
                        <p class="text-zinc-500 text-sm mb-8">Villa Bosch, Argentina</p>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                                <span class="block text-2xl font-800" id="stat-count">0</span>
                                <span class="text-[9px] font-black text-zinc-600 uppercase">Reviews</span>
                            </div>
                            <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                                <span class="block text-2xl font-800 text-yellow-500" id="stat-avg">0.0</span>
                                <span class="text-[9px] font-black text-zinc-600 uppercase">Promedio</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-2">
                    <h4 class="text-xl font-800 mb-6 tracking-tight">Actividad Reciente</h4>
                    <div id="review-list" class="space-y-4"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/95 z-[5000] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-zinc-900 border border-white/10 w-full max-w-md rounded-[2.5rem] p-10">
            <h3 class="text-2xl font-800 mb-2">Nueva Reseña</h3>
            <p id="modal-game" class="text-[#E8384D] font-bold text-xs uppercase tracking-widest mb-8"></p>
            
            <div class="stars flex gap-3 justify-center mb-8" id="star-box">
                <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
            </div>

            <textarea id="modal-text" placeholder="¿Qué te pareció el juego?" 
                class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm h-32 mb-6 focus:outline-none focus:border-[#E8384D] transition-colors resize-none"></textarea>
            
            <button onclick="App.saveReview()" class="w-full btn-primary py-4 rounded-2xl font-800 text-[11px] uppercase tracking-widest">Confirmar Registro</button>
            <button onclick="UI.modal(false)" class="w-full mt-4 text-zinc-600 text-[10px] font-bold uppercase tracking-widest hover:text-white transition">Cancelar</button>
        </div>
    </div>

    <div id="terminal" onclick="this.classList.toggle('open')">
        <span id="term-content"></span>
    </div>

    <script>
        /**
         * ROBLOXD V3 - RESILIENT ENGINE
         * Bypass 403 Forbidden & CORS
         */

        const CONFIG = {
            PROXIES: [
                "https://api.allorigins.win/raw?url=",
                "https://corsproxy.io/?",
                "https://thingproxy.freeboard.io/fetch/"
            ],
            RO_API: "https://games.rotunnel.com/v1",
            THUMB_API: "https://thumbnails.rotunnel.com/v1",
            // Datos de reserva si la API falla (Evita el 403 visual)
            MOCK_DATA: [
                { id: 15768329004, name: "Blox Fruits", playing: 450200, visits: 32000000000, creator: { name: "Gamer Robot" }, iconUrl: "https://tr.rbxcdn.com/180DAY-707624634f19d9b4b0870f7d549f3e0d/420/420/Image/Webp" },
                { id: 920587430, name: "Adopt Me!", playing: 120500, visits: 35000000000, creator: { name: "DreamCraft" }, iconUrl: "https://tr.rbxcdn.com/180DAY-0c1737f59d4791e8433d7b37807c4273/420/420/Image/Webp" },
                { id: 606849621, name: "Jailbreak", playing: 15000, visits: 6000000000, creator: { name: "Badimo" }, iconUrl: "https://tr.rbxcdn.com/180DAY-007d4b248a8553f18579974c20689b09/420/420/Image/Webp" },
                { id: 2788229976, name: "Brookhaven RP", playing: 380000, visits: 42000000000, creator: { name: "Wolfpaq" }, iconUrl: "https://tr.rbxcdn.com/180DAY-a5676e626e386053308316f066539e6c/420/420/Image/Webp" }
            ]
        };

        let STATE = {
            games: [],
            selected: null,
            rating: 0,
            reviews: JSON.parse(localStorage.getItem('rbxd_revs') || '[]')
        };

        const Router = {
            go(id) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById(`view-${id}`).classList.add('active');
                if(id === 'profile') UI.drawProfile();
                window.scrollTo(0,0);
            }
        };

        const API = {
            async fetch(url) {
                // Rotación de proxies para evadir 403
                for (let proxy of CONFIG.PROXIES) {
                    try {
                        UI.log(`Bypass: Intentando con ${proxy.split('/')[2]}...`);
                        const res = await fetch(proxy + encodeURIComponent(url));
                        if (res.ok) {
                            UI.log("Conexión Exitosa", "success");
                            return await res.json();
                        }
                    } catch (e) { continue; }
                }
                throw new Error("API Bloqueada");
            },

            async getGames(query = "popular") {
                UI.skeletons();
                UI.status("Conectando...", "yellow");
                
                try {
                    const data = await this.fetch(`${CONFIG.RO_API}/games/list?keyword=${query}&maxRows=15`);
                    const ids = data.games.map(g => g.universeId).join(',');
                    
                    const [details, icons] = await Promise.all([
                        this.fetch(`${CONFIG.RO_API}/games?universeIds=${ids}`),
                        this.fetch(`${CONFIG.THUMB_API}/games/icons?universeIds=${ids}&size=150x150&format=Png`)
                    ]);

                    STATE.games = details.data.map(g => ({
                        ...g,
                        iconUrl: icons.data.find(i => i.targetId === g.universeId)?.imageUrl || ''
                    }));

                    UI.drawGrid(STATE.games);
                    UI.status("RoTunnel Online", "green");
                } catch (e) {
                    UI.log("Error 403 / CORS detectado. Activando SafeMode.", "error");
                    UI.status("Modo Offline", "red");
                    STATE.games = CONFIG.MOCK_DATA;
                    UI.drawGrid(STATE.games);
                }
            }
        };

        const UI = {
            log(m, type = "") {
                const t = document.getElementById('term-content');
                const color = type === 'error' ? '#f44' : (type === 'success' ? '#0f0' : '#888');
                t.innerHTML = `<span style="color:${color}">[${new Date().toLocaleTimeString()}] ${m}</span>`;
            },

            status(txt, color) {
                const d = document.getElementById('dot');
                const t = document.getElementById('status-text');
                d.className = `w-2 h-2 rounded-full bg-${color}-500 animate-pulse`;
                t.innerText = txt;
            },

            skeletons() {
                document.getElementById('grid').innerHTML = Array(10).fill('<div class="h-64 rounded-3xl shimmer"></div>').join('');
            },

            drawGrid(list) {
                document.getElementById('grid').innerHTML = list.map(g => `
                    <div class="game-card flex flex-col cursor-pointer" onclick="App.open(${g.id})">
                        <img src="${g.iconUrl}" class="w-full aspect-square object-cover rounded-t-[28px]">
                        <div class="p-6">
                            <h5 class="font-800 text-[13px] truncate mb-2">${g.name}</h5>
                            <div class="flex justify-between items-center">
                                <span class="text-[9px] text-zinc-500 font-black uppercase tracking-widest">${g.creator.name}</span>
                                <span class="text-green-500 font-bold text-[11px]">${(g.playing/1000).toFixed(1)}k</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            },

            drawDetail(g) {
                document.getElementById('detail-container').innerHTML = `
                    <div class="flex flex-col lg:flex-row gap-16">
                        <div class="w-full lg:w-80 shrink-0">
                            <img src="${g.iconUrl}" class="w-full rounded-[3rem] shadow-2xl border border-white/10">
                            <button onclick="UI.modal(true)" class="w-full mt-8 btn-primary py-5 rounded-2xl font-800 text-[11px] uppercase tracking-widest">Añadir Review</button>
                            <button onclick="Router.go('home')" class="w-full mt-4 text-zinc-500 text-[10px] font-black uppercase tracking-widest">← Volver</button>
                        </div>
                        <div class="flex-1">
                            <h2 class="text-6xl font-800 tracking-tighter mb-6">${g.name}</h2>
                            <p class="text-xl text-zinc-400 leading-relaxed mb-10">${g.description || "Descripción no disponible en este momento."}</p>
                            <div class="flex gap-6">
                                <div class="bg-zinc-900 p-6 rounded-3xl border border-white/5 flex-1">
                                    <span class="text-[10px] font-black text-zinc-500 uppercase block mb-1">Activos</span>
                                    <span class="text-3xl font-800 text-green-500">${g.playing.toLocaleString()}</span>
                                </div>
                                <div class="bg-zinc-900 p-6 rounded-3xl border border-white/5 flex-1">
                                    <span class="text-[10px] font-black text-zinc-500 uppercase block mb-1">Visitas</span>
                                    <span class="text-3xl font-800">${(g.visits/1000000000).toFixed(1)}B</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            drawProfile() {
                const revs = STATE.reviews;
                document.getElementById('stat-count').innerText = revs.length;
                document.getElementById('stat-avg').innerText = revs.length ? (revs.reduce((a,b)=>a+b.v,0)/revs.length).toFixed(1) : "0.0";
                
                document.getElementById('review-list').innerHTML = revs.map(r => `
                    <div class="game-card p-6 flex gap-6 items-center">
                        <img src="${r.img}" class="w-14 h-14 rounded-xl object-cover">
                        <div class="flex-1">
                            <div class="flex justify-between">
                                <h6 class="font-800 text-sm">${r.name}</h6>
                                <span class="text-yellow-500 text-xs">${'★'.repeat(r.v)}</span>
                            </div>
                            <p class="text-zinc-500 text-xs mt-1 italic">"${r.txt}"</p>
                        </div>
                    </div>
                `).join('');
            },

            modal(show) {
                const m = document.getElementById('modal');
                if(show) {
                    document.getElementById('modal-game').innerText = STATE.selected.name;
                    m.classList.remove('hidden');
                } else {
                    m.classList.add('hidden');
                }
            }
        };

        const App = {
            init() {
                API.getGames();
                this.events();
            },

            events() {
                document.querySelectorAll('#star-box span').forEach(s => {
                    s.onclick = () => {
                        const v = parseInt(s.dataset.v);
                        STATE.rating = v;
                        document.querySelectorAll('#star-box span').forEach((el, i) => el.classList.toggle('active', i < v));
                    };
                });
            },

            search(q) {
                API.getGames(q);
            },

            open(id) {
                STATE.selected = STATE.games.find(g => g.id === id);
                UI.drawDetail(STATE.selected);
                Router.go('detail');
            },

            saveReview() {
                if(!STATE.rating) return;
                const txt = document.getElementById('modal-text').value;
                STATE.reviews.unshift({
                    name: STATE.selected.name,
                    img: STATE.selected.iconUrl,
                    v: STATE.rating,
                    txt: txt
                });
                localStorage.setItem('rbxd_revs', JSON.stringify(STATE.reviews));
                UI.modal(false);
                Router.go('profile');
            }
        };

        App.init();
    </script>
</body>
</html>
